<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SnowCracker's Aviation Photography Collection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>SnowCracker's Aviation Photography Collection</h1>

    <div class="search-bar">
        <input type="text" id="search" placeholder="搜索：空格分隔多关键词，支持碎片化搜索（广州/CAN/2023/B-）" oninput="doSearch()">
        <button onclick="openUpload()">上传图片</button>
    </div>

    <div class="nav">
        <button onclick="navByTime()">拍摄时间</button>
        <button onclick="navByLocation()">拍摄地点</button>
        <button onclick="navByAirline()">航空公司</button>
        <button onclick="navByModel()">飞机机型</button>
    </div>

    <div id="subNav" class="sub-nav"></div>
    <div id="gallery" class="masonry"></div>
</div>

<!-- 上传弹窗 -->
<div id="uploadModal" class="modal">
    <div class="modal-box">
        <h2>上传航空摄影</h2>
        <input type="file" id="imgFiles" multiple accept="image/*" onchange="previewImages()">
        <div id="previewArea"></div>

        <input placeholder="拍摄时间 例：2025-03-29" id="time">
        <input placeholder="拍摄地点" id="location">
        <input placeholder="ICAO 代码" id="icao">
        <input placeholder="航空公司" id="airline">
        <input placeholder="航司代码 例：CES/CCA/CAS" id="airlineCode">
        <input placeholder="所属国家" id="country">
        <input placeholder="飞机机型 宽体机/窄体机" id="model">
        <input placeholder="具体机型 A320neo/B787-9" id="fullModel">
        <input placeholder="机龄" id="age">
        <input placeholder="飞机注册号" id="reg">
        <input placeholder="起降情况" id="status">
        <textarea placeholder="备注" id="note"></textarea>

        <div class="btn-row">
            <button onclick="submitPhoto()">确认提交</button>
            <button onclick="closeUpload()">取消</button>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div id="detailModal" class="modal">
    <div class="detail-box">
        <div class="detail-head">
            <button onclick="closeDetail()">关闭</button>
            <button onclick="openEdit()">修改信息</button>
        </div>
        <div class="img-slider">
            <button class="arrow" onclick="prevImg()">&lt;</button>
            <img id="showImg">
            <button class="arrow" onclick="nextImg()">&gt;</button>
        </div>
        <div class="detail-info" id="detailInfo"></div>
    </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
